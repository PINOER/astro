<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- 背景深色渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090a"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    
    <!-- 科技蓝紫光晕渐变 -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- 柔和发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- 背景网格装饰线 -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="450" x2="1200" y2="450" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
  </g>

  <!-- 顶部科技发光背景圆光 -->
  <circle cx="600" cy="100" r="250" fill="#6366f1" opacity="0.12" filter="url(#glow)" />
  <circle cx="850" cy="200" r="180" fill="#06b6d4" opacity="0.08" filter="url(#glow)" />

  <!-- 主卡片边缘线 (Vercel/Linear 风格) -->
  <rect x="250" y="140" width="700" height="350" rx="20" fill="rgba(18, 20, 29, 0.7)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" />

  <!-- 卡片内部元素模拟（图标 + Token 进度条） -->
  <text x="310" y="220" font-family="-apple-system, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">📊 LLM Token &amp; Context Limits</text>
  <text x="310" y="255" font-family="-apple-system, sans-serif" font-size="16" fill="#8e9bb0">Analyze tokens, characters and model context windows instantly.</text>

  <!-- 模拟进度条 1: GPT-4o -->
  <text x="310" y="320" font-family="-apple-system, sans-serif" font-size="14" fill="#a5b4fc" font-weight="600">GPT-4o (128k Tokens)</text>
  <rect x="310" y="335" width="580" height="10" rx="5" fill="rgba(255,255,255,0.08)" />
  <rect x="310" y="335" width="240" height="10" rx="5" fill="url(#accent)" />

  <!-- 模拟进度条 2: Claude 3.5 Sonnet -->
  <text x="310" y="390" font-family="-apple-system, sans-serif" font-size="14" fill="#38bdf8" font-weight="600">Claude 3.5 Sonnet (200k Tokens)</text>
  <rect x="310" y="405" width="580" height="10" rx="5" fill="rgba(255,255,255,0.08)" />
  <rect x="310" y="405" width="160" height="10" rx="5" fill="url(#accent)" />

  <!-- 顶部/底部精致点缀胶囊标签 -->
  <rect x="510" y="80" width="180" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1" />
  <text x="600" y="103" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">⚡ HELPMINI TOOLS</text>
</svg>
