<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" style="background:#0b0f19; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- 背景极光渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- 发光圆环渐变 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <!-- 卡片玻璃拟态发光 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景底色 -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- 网格暗纹 -->
  <g stroke="#334155" stroke-width="1" opacity="0.15">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200" />
    <path d="M200 0 V630 M400 0 V630 M600 0 V630 M800 0 V630 M1000 0 V630" />
  </g>

  <!-- 左侧：原始图片面板 -->
  <g transform="translate(100, 140)">
    <rect width="380" height="350" rx="16" fill="#1e293b" fill-opacity="0.7" stroke="#334155" stroke-width="1.5" />
    <text x="30" y="50" fill="#94a3b8" font-size="16" font-weight="600" letter-spacing="1">INPUT : RAW IMAGE</text>
    
    <!-- 模拟图像占位图 -->
    <rect x="30" y="80" width="320" height="200" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
    <circle cx="130" cy="150" r="28" fill="#6366f1" opacity="0.8"/>
    <path d="M70 230 L150 170 L210 210 L260 175 L310 230 Z" fill="#06b6d4" opacity="0.6"/>
    
    <text x="30" y="315" fill="#64748b" font-size="14" font-family="monospace">Format: PNG / JPG / SVG (Binary)</text>
  </g>

  <!-- 中央转换光弧与图标 -->
  <g transform="translate(540, 265)">
    <circle cx="60" cy="50" r="45" fill="#1e1b4b" stroke="url(#accentGrad)" stroke-width="3" filter="url(#glow)"/>
    <path d="M42 50 L78 50 M68 40 L78 50 L68 60" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 右侧：Base64 代码输出面板 -->
  <g transform="translate(720, 140)">
    <rect width="380" height="350" rx="16" fill="#1e293b" fill-opacity="0.9" stroke="url(#accentGrad)" stroke-width="2" filter="url(#glow)"/>
    <text x="30" y="50" fill="#06b6d4" font-size="16" font-weight="700" letter-spacing="1">OUTPUT : DATA URI STRING</text>
    
    <!-- 代码模拟窗口 -->
    <rect x="30" y="80" width="320" height="230" rx="10" fill="#090d16"/>
    <text x="50" y="115" fill="#e2e8f0" font-size="13" font-family="monospace">data:image/png;base64,</text>
    <text x="50" y="145" fill="#6366f1" font-size="13" font-family="monospace">iVBORw0KGgoAAAANSUhEUg</text>
    <text x="50" y="175" fill="#6366f1" font-size="13" font-family="monospace">AAAAEAAAABCAYAAAAfFcSJ</text>
    <text x="50" y="205" fill="#6366f1" font-size="13" font-family="monospace">AAAADUlEQVR42mNk+M9Q</text>
    <text x="50" y="235" fill="#6366f1" font-size="13" font-family="monospace">WAIAMXAC8i09P0gAAAABJ</text>
    <text x="50" y="265" fill="#38bdf8" font-size="13" font-family="monospace">RU5ErkJggg==</text>
  </g>

  <!-- 底部品牌 Logo -->
  <text x="600" y="560" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="800" letter-spacing="-0.5">HelpMini <tspan fill="#6366f1">Tools</tspan></text>
  <text x="600" y="585" text-anchor="middle" fill="#64748b" font-size="13" font-weight="500">100% Client-Side Private Image Converter</text>
</svg>
