<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- 背景深色渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090a"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    
    <!-- 青绿与蓝紫霓虹渐变 -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- 柔和发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- 背景网格装饰线 -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="450" x2="1200" y2="450" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
  </g>

  <!-- 顶部科技发光背景圆光 -->
  <circle cx="600" cy="120" r="220" fill="#06b6d4" opacity="0.12" filter="url(#glow)" />
  <circle cx="350" cy="250" r="160" fill="#6366f1" opacity="0.08" filter="url(#glow)" />

  <!-- 主卡片：模拟 Google SERP 白底卡片衬在暗黑科技框中 -->
  <rect x="220" y="140" width="760" height="360" rx="20" fill="rgba(18, 20, 29, 0.75)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />

  <!-- 内部 Google SERP 白底预览模拟卡片 -->
  <rect x="260" y="220" width="680" height="230" rx="12" fill="#ffffff" />

  <!-- Google SERP 标题与搜索条模拟 -->
  <text x="290" y="260" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a0dab">10+ Proven Shopify SEO Tips for 2026 (Step-by-Step Guide)</text>
  <text x="290" y="285" font-family="Arial, sans-serif" font-size="13" fill="#4d5156">https://helpmini.com/blog/shopify-seo-guide</text>
  <text x="290" y="315" font-family="Arial, sans-serif" font-size="14" fill="#474747">Discover actionable strategies to boost your store organic rankings. Learn how to optimize product pages, meta tags, and site speed instantly...</text>

  <!-- SERP 卡片内部的绿勾与字数校验 -->
  <rect x="290" y="365" width="220" height="28" rx="6" fill="#f1f5f9" />
  <text x="300" y="384" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#16a34a">✓ Title: 56/60 Chars (Ideal)</text>

  <rect x="525" y="365" width="220" height="28" rx="6" fill="#f1f5f9" />
  <text x="535" y="384" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#16a34a">✓ Desc: 142/155 Chars (Ideal)</text>

  <!-- 顶部/卡片标题 -->
  <text x="260" y="188" font-family="-apple-system, sans-serif" font-size="24" font-weight="bold" fill="#ffffff">🔍 Google SERP Preview &amp; Meta Tag Generator</text>

  <!-- 顶部胶囊标签 -->
  <rect x="490" y="75" width="220" height="36" rx="18" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.3)" stroke-width="1" />
  <text x="600" y="98" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#38bdf8" text-anchor="middle">⚡ SEO CTR BOOST TOOL</text>
</svg>
