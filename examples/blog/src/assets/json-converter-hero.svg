<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- 背景深色渐变 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090a"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    
    <!-- 青蓝与紫色霓虹渐变 -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- 柔和发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- 背景网格装饰线 -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="450" x2="1200" y2="450" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
  </g>

  <!-- 背景高光圆 -->
  <circle cx="600" cy="120" r="220" fill="#6366f1" opacity="0.12" filter="url(#glow)" />
  <circle cx="850" cy="280" r="150" fill="#38bdf8" opacity="0.08" filter="url(#glow)" />

  <!-- 主外框容器 -->
  <rect x="220" y="140" width="760" height="360" rx="20" fill="rgba(18, 20, 29, 0.75)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />

  <!-- 模拟代码编辑器窗口 -->
  <rect x="260" y="210" width="680" height="240" rx="12" fill="#090d16" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

  <!-- 编辑器顶部控制点 (Mac Window Controls) -->
  <circle cx="285" cy="232" r="5" fill="#ef4444" opacity="0.8" />
  <circle cx="300" cy="232" r="5" fill="#f59e0b" opacity="0.8" />
  <circle cx="315" cy="232" r="5" fill="#10b981" opacity="0.8" />

  <!-- 代码内容高亮模拟 -->
  <text x="285" y="270" font-family="monospace" font-size="15" fill="#94a3b8">{</text>
  <text x="305" y="295" font-family="monospace" font-size="15" fill="#38bdf8">"tool"<span fill="#94a3b8">:</span> <span fill="#a5b4fc">"HelpMini JSON Formatter"</span><span fill="#94a3b8">,</span></text>
  <text x="305" y="320" font-family="monospace" font-size="15" fill="#38bdf8">"privacy"<span fill="#94a3b8">:</span> <span fill="#4ade80">"100% Client-Side"</span><span fill="#94a3b8">,</span></text>
  <text x="305" y="345" font-family="monospace" font-size="15" fill="#38bdf8">"status"<span fill="#94a3b8">:</span> <span fill="#f43f5e">"Valid JSON ✓"</span></text>
  <text x="285" y="370" font-family="monospace" font-size="15" fill="#94a3b8">}</text>

  <!-- 校验成功的标签条 -->
  <rect x="285" y="395" width="220" height="30" rx="6" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.3)" stroke-width="1" />
  <text x="298" y="415" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#4ade80">✓ Valid JSON Format</text>

  <!-- 卡片主标题 -->
  <text x="260" y="182" font-family="-apple-system, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">⚙️ JSON &amp; Data Schema Formatter</text>

  <!-- 顶部胶囊标签 -->
  <rect x="490" y="75" width="220" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1" />
  <text x="600" y="98" font-family="-apple-system, sans-serif" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">⚡ DEVELOPER UTILITY</text>
</svg>
